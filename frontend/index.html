<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand favicons (replace the default Vite SVG). PNG variants
         generated by frontend/scripts/generate-pwa-icons.py — concentric
         green rings + bright accent core, on the system dark background. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <!-- iOS home-screen icon. Apple uses apple-touch-icon (180x180) and
         the meta tags below to drive its "Add to Home Screen" install. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA install manifest. Chrome on Android reads this to offer the
         "Install app" prompt; iOS Safari respects start_url + display
         mode from it. Without it, the app stays a browser tab; with it,
         the home-screen icon launches into a full-screen standalone app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- viewport-fit=cover lets us paint behind the iPhone notch / Dynamic
         Island. interactive-widget=resizes-content keeps the iOS keyboard
         from covering the input it just popped up for. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Theme color drives the Android browser chrome tint and the
         standalone-app title bar. iOS PWA status-bar styling uses the
         apple-mobile-web-app-* meta tags below. -->
    <meta name="theme-color" content="#04060a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="my-AI-stro" />
    <!-- Studio banner — picked up by link cards (OpenGraph, Twitter),
         search engines, and "View page info" / inspect-page sidebars.
         Quiet publisher signature, same as the footer in the README,
         ARCHITECTURE, and AboutPanel. -->
    <meta name="author" content="MoreSalamander StudioLabs" />
    <meta name="description" content="my-AI-stro — a local-first, self-improving personal knowledge system. A MoreSalamander StudioLabs production." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>my-AI-stro</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
